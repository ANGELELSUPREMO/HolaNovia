<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Flappy Love ❤️</title>

	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			overflow: hidden;
			background: linear-gradient(to bottom, #ffb6d9, #ffe6f2);
			font-family: Arial, Helvetica, sans-serif;
		}

		canvas {
			display: block;
			margin: auto;
			background: linear-gradient(to bottom, #87ceeb, #ffffff);
		}

		.mensaje {
			position: absolute;
			width: 100%;
			text-align: center;
			top: 20px;
			font-size: 2rem;
			color: white;
			text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
			font-weight: bold;
		}
	</style>
</head>

<body>

	<div class="mensaje">❤️Flappy Novia❤️</div>

	<canvas id="game" width="400" height="600"></canvas>

	<script>
		const canvas = document.getElementById("game");
		const ctx = canvas.getContext("2d");

		// ===== IMAGEN DEL PERSONAJE =====
		const birdImg = new Image();
		birdImg.src = "novia.png";
		// Pon aquí la imagen de tu novia dentro de la carpeta juego

		// ===== VARIABLES =====
		let bird = {
			x: 80,
			y: 250,
			width: 50,
			height: 50,
			gravity: 0.6,
			velocity: 0,
			jump: -6
		};

		let pipes = [];
		let frame = 0;
		let score = 0;
		let gameOver = false;

		// ===== CONTROL =====
		document.addEventListener("keydown", () => {
			bird.velocity = bird.jump;
		});

		document.addEventListener("click", () => {
			bird.velocity = bird.jump;
		});

		// ===== TUBOS =====
		function createPipe() {
			let gap = 200;
			let topHeight = Math.random() * 250 + 50;

			pipes.push({
				x: canvas.width,
				top: topHeight,
				bottom: canvas.height - topHeight - gap,
				width: 50,
				passed: false
			});
		}

		// ===== DIBUJAR PERSONAJE =====
		function drawBird() {
			ctx.save();

			// Rotación suave
			let angle = bird.velocity * 0.01;
			ctx.translate(
				bird.x + bird.width / 2,
				bird.y + bird.height / 2
			);
			ctx.rotate(angle);

			ctx.drawImage(
				birdImg,
				-bird.width / 2,
				-bird.height / 2,
				bird.width,
				bird.height
			);

			ctx.restore();
		}

		// ===== DIBUJAR TUBOS =====
		function drawPipes() {
			ctx.fillStyle = "#ff4f93";

			pipes.forEach(pipe => {

				// Arriba
				ctx.fillRect(
					pipe.x,
					0,
					pipe.width,
					pipe.top
				);

				// Abajo
				ctx.fillRect(
					pipe.x,
					canvas.height - pipe.bottom,
					pipe.width,
					pipe.bottom
				);
			});
		}

		// ===== ACTUALIZAR =====
		function update() {

			if (gameOver) return;

			frame++;

			// Física pájaro
			bird.velocity += bird.gravity;
			bird.y += bird.velocity;

			// Crear tubos
			if (frame % 90 === 0) {
				createPipe();
			}

			// Movimiento tubos
			pipes.forEach(pipe => {
				pipe.x -= 3;

				// Colisiones
				if (
					bird.x < pipe.x + pipe.width &&
					bird.x + bird.width > pipe.x &&
					(
						bird.y < pipe.top ||
						bird.y + bird.height > canvas.height - pipe.bottom
					)
				) {
					gameOver = true;
				}

				// Puntaje
				if (!pipe.passed && pipe.x + pipe.width < bird.x) {
					pipe.passed = true;
					score++;

					// Ganar al llegar a 10
					if (score >= 10) {
						window.location.href = "final.html";
					}
				}

			});

			// Suelo o techo
			if (
				bird.y + bird.height > canvas.height ||
				bird.y < 0
			) {
				gameOver = true;
			}
		}

		// ===== DIBUJAR =====
		function draw() {

			ctx.clearRect(0, 0, canvas.width, canvas.height);

			drawPipes();
			drawBird();

			// Score
			ctx.fillStyle = "#fff";
			ctx.font = "40px Arial";
			ctx.fillText(score, 20, 60);

			// Game Over
			if (gameOver) {
				ctx.fillStyle = "rgba(0,0,0,0.5)";
				ctx.fillRect(0, 0, canvas.width, canvas.height);

				ctx.fillStyle = "#fff";
				ctx.font = "40px Arial";
				ctx.fillText("Game Over 💔", 70, 250);

				ctx.font = "25px Arial";
				ctx.fillText("Recarga para jugar", 85, 320);
			}
		}

		// ===== LOOP =====
		function loop() {
			update();
			draw();
			requestAnimationFrame(loop);
		}

		loop();
	</script>

</body>

</html>

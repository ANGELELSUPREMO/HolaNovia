<!DOCTYPE html>
<html lang="es">

<head>

	<meta charset="UTF-8">

	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Para mi novia ❤️</title>

	<!-- Fuente bonita -->

	<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

	<style>
		* {

			margin: 0;

			padding: 0;

			box-sizing: border-box;

		}

		body {

			height: 100vh;

			display: flex;

			justify-content: center;

			align-items: center;

			background: linear-gradient(135deg, #ff9ecf, #ffd6e7, #fff0f6);

			overflow: hidden;

			font-family: 'Poppins', sans-serif;

		}

		/* Corazones de fondo */

		body::before,

		body::after {

			content: "❤️";

			position: absolute;

			font-size: 120px;

			opacity: 0.08;

			animation: flotar 8s infinite ease-in-out;

		}

		body::before {

			top: 10%;

			left: 10%;

		}

		body::after {

			bottom: 10%;

			right: 10%;

			animation-delay: 4s;

		}

		@keyframes flotar {

			0% {

				transform: translateY(0px) rotate(0deg);

			}

			50% {

				transform: translateY(-20px) rotate(10deg);

			}

			100% {

				transform: translateY(0px) rotate(0deg);

			}

		}

		.container {

			text-align: center;

			padding: 40px;

			border-radius: 25px;

			background: rgba(255, 255, 255, 0.25);

			backdrop-filter: blur(12px);

			box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);

			max-width: 900px;

		}

		h1 {

			font-family: 'Pacifico', cursive;

			font-size: clamp(2.5rem, 5vw, 5rem);

			color: #ff2e75;

			text-shadow:

				0 0 10px rgba(255, 46, 117, 0.1),

				0 0 20px rgba(255, 46, 117, 0.1),

				2px 2px 8px rgba(0, 0, 0, 0.15);

			animation: aparecer 2s ease;

			line-height: 1.4;

		}

		h1 span {

			display: block;

			margin-top: 10px;

			color: #ff5c93;

			font-size: 0.8em;

		}

		@keyframes aparecer {

			from {

				opacity: 0;

				transform: translateY(40px) scale(0.9);

			}

			to {

				opacity: 1;

				transform: translateY(0) scale(1);

			}

		}

		p {

			margin-top: 25px;

			font-size: 1.2rem;

			color: #6b2145;

			font-weight: 300;

		}

		.btn {

			margin-top: 35px;

			padding: 14px 28px;

			border: none;

			border-radius: 50px;

			background: #ff2e75;

			color: white;

			font-size: 1rem;

			cursor: pointer;

			transition: 0.3s;

			box-shadow: 0 5px 15px rgba(255, 46, 117, 0.4);

		}

		.btn:hover {

			transform: scale(1.08);

			background: #ff0f63;

		}
	</style>


</head>

<body>

	<div class="container">

		<h1>

			Hola novia 💖

			<span>Este juego es para ti, espero que te guste ✨</span>

		</h1>

		<p>

			He hecho esta página especialmente para ti ❤️

		</p>

		<button class="btn" onclick="window.location.href='juego.html'">Comenzar juego 🎮</button>



</body>

</html>
